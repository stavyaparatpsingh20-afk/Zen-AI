<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZEN — AI Assistant by Stavya</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── LIGHT MODE (default) ── */
  :root, [data-theme="light"] {
    --bg:          #f5f0e8;
    --bg2:         #ede7da;
    --sidebar-bg:  #e8e0d0;
    --surface:     #ede7da;
    --border:      #d4c9b5;
    --border2:     #c8bb9f;
    --accent:      #7a5c3a;
    --accent-soft: #a07850;
    --accent-bg:   rgba(122,92,58,0.08);
    --text:        #2e2018;
    --text2:       #6b5640;
    --muted:       #9c8570;
    --user-bubble: #e0d5c2;
    --ai-bubble:   #f0ebe0;
    --input-bg:    #ede7da;
    --send-bg:     #7a5c3a;
    --send-fg:     #f5f0e8;
    --dot-color:   #8a6a3a;
    --shadow:      rgba(90,60,20,0.10);
  }

  /* ── DARK MODE ── */
  [data-theme="dark"] {
    --bg:          #1c1610;
    --bg2:         #251d14;
    --sidebar-bg:  #201810;
    --surface:     #2c2318;
    --border:      #3d3020;
    --border2:     #4a3a26;
    --accent:      #c49a5a;
    --accent-soft: #d4aa70;
    --accent-bg:   rgba(196,154,90,0.10);
    --text:        #f0e8d8;
    --text2:       #c8b090;
    --muted:       #8a7055;
    --user-bubble: #2e2418;
    --ai-bubble:   #241c12;
    --input-bg:    #2c2318;
    --send-bg:     #c49a5a;
    --send-fg:     #1c1610;
    --dot-color:   #c49a5a;
    --shadow:      rgba(0,0,0,0.3);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    overflow: hidden;
    transition: background 0.3s, color 0.3s;
  }

  /* ── SIDEBAR ── */
  #sidebar {
    width: 256px;
    flex-shrink: 0;
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    transition: background 0.3s, border-color 0.3s;
  }

  .sidebar-header {
    padding: 22px 18px 16px;
    border-bottom: 1px solid var(--border);
  }

  .yinyang-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }

  .yinyang {
    width: 38px;
    height: 38px;
    flex-shrink: 0;
    animation: spin-slow 16s linear infinite;
  }

  @keyframes spin-slow {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .brand-text { display: flex; flex-direction: column; }

  .brand-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.35rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.12em;
    line-height: 1;
    transition: color 0.3s;
  }

  .brand-by {
    font-family: 'Space Mono', monospace;
    font-size: 0.54rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    margin-top: 4px;
    transition: color 0.3s;
  }

  .brand-by span { color: var(--accent-soft); font-weight: 700; }

  .new-chat-btn {
    width: 100%;
    margin-top: 12px;
    padding: 9px 13px;
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--text2);
    font-family: 'Space Mono', monospace;
    font-size: 0.66rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s;
    letter-spacing: 0.06em;
  }

  .new-chat-btn:hover {
    background: var(--accent-bg);
    border-color: var(--accent);
    color: var(--accent);
  }

  .new-chat-btn svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2.5; flex-shrink: 0; }

  .sidebar-section-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.55rem;
    color: var(--muted);
    letter-spacing: 0.14em;
    padding: 14px 18px 6px;
    text-transform: uppercase;
  }

  #chat-history {
    flex: 1;
    overflow-y: auto;
    padding: 0 8px 12px;
  }

  #chat-history::-webkit-scrollbar { width: 3px; }
  #chat-history::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .history-item {
    padding: 9px 10px;
    border-radius: 7px;
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: 2px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
    border: 1px solid transparent;
  }

  .history-item:hover { background: var(--surface); }
  .history-item.active { background: var(--accent-bg); border-color: var(--border2); }

  .history-item-text {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.76rem;
    font-weight: 400;
    color: var(--text2);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
    line-height: 1.4;
  }

  .history-item.active .history-item-text { color: var(--accent); font-weight: 500; }

  .history-delete {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 4px;
    opacity: 0;
    transition: opacity 0.15s;
    flex-shrink: 0;
    font-size: 0.62rem;
    line-height: 1;
  }

  .history-item:hover .history-delete { opacity: 1; }
  .history-delete:hover { color: #b04040; }

  .history-empty {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem;
    color: var(--muted);
    text-align: center;
    padding: 24px 12px;
    opacity: 0.6;
    line-height: 1.8;
  }

  .sidebar-footer {
    padding: 12px 18px;
    border-top: 1px solid var(--border);
    font-family: 'Space Mono', monospace;
    font-size: 0.54rem;
    color: var(--muted);
    text-align: center;
    line-height: 1.7;
  }

  /* ── MAIN ── */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
    transition: background 0.3s;
  }

  header {
    padding: 13px 26px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    transition: background 0.3s, border-color 0.3s;
  }

  .current-chat-title {
    font-family: 'Space Mono', monospace;
    font-size: 0.67rem;
    color: var(--muted);
    letter-spacing: 0.07em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 380px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }

  /* Theme toggle */
  .theme-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 4px 6px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .theme-toggle:hover { border-color: var(--accent); }

  .theme-btn {
    width: 26px;
    height: 22px;
    border-radius: 100px;
    border: none;
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    transition: background 0.2s;
    color: var(--muted);
  }

  .theme-btn.active {
    background: var(--accent);
    color: var(--send-fg);
  }

  .status {
    display: flex;
    align-items: center;
    gap: 7px;
    font-family: 'Space Mono', monospace;
    font-size: 0.64rem;
    color: var(--muted);
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--dot-color);
    animation: blink 2.5s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.3; }
  }

  #chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 32px 36px;
    scroll-behavior: smooth;
  }

  #chat-container::-webkit-scrollbar { width: 4px; }
  #chat-container::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* Welcome */
  .welcome {
    text-align: center;
    padding: 56px 20px 40px;
    animation: fadeUp 0.5s ease forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .welcome h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.9rem, 4vw, 3rem);
    font-weight: 700;
    color: var(--text);
    line-height: 1.15;
    margin-bottom: 14px;
    transition: color 0.3s;
  }

  .welcome h1 span { color: var(--accent); }

  .welcome p {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    color: var(--muted);
    max-width: 360px;
    margin: 0 auto 34px;
    line-height: 1.75;
    font-weight: 300;
  }

  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    max-width: 500px;
    margin: 0 auto;
  }

  .suggestion-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 8px 16px;
    border-radius: 100px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    font-weight: 400;
    cursor: pointer;
    transition: all 0.2s;
  }

  .suggestion-btn:hover {
    background: var(--accent-bg);
    border-color: var(--accent);
    color: var(--accent);
    transform: translateY(-1px);
    box-shadow: 0 2px 8px var(--shadow);
  }

  /* Messages */
  .message {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    animation: fadeUp 0.25s ease forwards;
  }

  .message.user { flex-direction: row-reverse; }

  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.62rem;
    font-weight: 700;
    flex-shrink: 0;
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.03em;
    border: 1px solid var(--border2);
  }

  .avatar.ai   { background: var(--surface); color: var(--accent); }
  .avatar.user { background: var(--accent); color: var(--send-fg); border-color: var(--accent); }

  .bubble {
    max-width: min(560px, 73%);
    padding: 12px 16px;
    border-radius: 14px;
    font-size: 0.88rem;
    line-height: 1.72;
    transition: background 0.3s, border-color 0.3s;
  }

  .message.ai .bubble {
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    color: var(--text);
  }

  .message.user .bubble {
    background: var(--user-bubble);
    border: 1px solid var(--border2);
    border-top-right-radius: 4px;
    text-align: right;
    color: var(--text);
  }

  .bubble p { margin-bottom: 8px; }
  .bubble p:last-child { margin-bottom: 0; }

  .bubble code {
    font-family: 'Space Mono', monospace;
    background: var(--accent-bg);
    border: 1px solid var(--border2);
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 0.79em;
    color: var(--accent);
  }

  .bubble pre {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 14px;
    overflow-x: auto;
    margin: 10px 0;
    font-family: 'Space Mono', monospace;
    font-size: 0.74rem;
    line-height: 1.6;
    color: var(--text2);
  }

  /* Typing */
  .typing-indicator { display: flex; gap: 5px; align-items: center; padding: 10px 4px; }

  .typing-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.45;
    animation: typing 1.3s ease-in-out infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.18s; }
  .typing-dot:nth-child(3) { animation-delay: 0.36s; }

  @keyframes typing {
    0%, 100% { transform: translateY(0);    opacity: 0.45; }
    50%       { transform: translateY(-5px); opacity: 1; }
  }

  /* Input */
  .input-area {
    padding: 16px 36px 20px;
    border-top: 1px solid var(--border);
    background: var(--bg);
    transition: background 0.3s, border-color 0.3s;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--input-bg);
    border: 1px solid var(--border2);
    border-radius: 14px;
    padding: 11px 14px;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.3s;
    box-shadow: 0 1px 4px var(--shadow);
  }

  .input-row:focus-within {
    border-color: var(--accent);
    box-shadow: 0 2px 12px var(--shadow);
  }

  #user-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    resize: none;
    max-height: 140px;
    min-height: 22px;
    line-height: 1.5;
  }

  #user-input::placeholder { color: var(--muted); font-weight: 300; }

  #send-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--send-bg);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    box-shadow: 0 1px 4px var(--shadow);
  }

  #send-btn:hover { opacity: 0.85; transform: scale(1.06); }
  #send-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
  #send-btn svg { width: 14px; height: 14px; fill: var(--send-fg); }

  .hint {
    font-family: 'Space Mono', monospace;
    font-size: 0.57rem;
    color: var(--muted);
    text-align: center;
    margin-top: 8px;
    letter-spacing: 0.05em;
  }

  .error-msg {
    color: #8b3030;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.76rem;
    padding: 7px 12px;
    background: rgba(139,48,48,0.07);
    border: 1px solid rgba(139,48,48,0.18);
    border-radius: 8px;
    margin-top: 6px;
    text-align: center;
  }
</style>
</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="sidebar-header">
    <div class="yinyang-wrap">
      <svg class="yinyang" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="g"><feGaussianBlur stdDeviation="1.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        </defs>
        <path d="M50,5 A45,45 0 0,0 50,95 A22.5,22.5 0 0,1 50,50 A22.5,22.5 0 0,0 50,5" fill="#7a5c3a"/>
        <path d="M50,5 A45,45 0 0,1 50,95 A22.5,22.5 0 0,0 50,50 A22.5,22.5 0 0,1 50,5" fill="#e8e0d0"/>
        <circle cx="50" cy="27.5" r="9.5" fill="#e8e0d0"/>
        <circle cx="50" cy="72.5" r="9.5" fill="#7a5c3a"/>
        <circle cx="50" cy="50" r="45" fill="none" stroke="#7a5c3a" stroke-width="1.5" opacity="0.6"/>
        <text x="50" y="55" text-anchor="middle" font-family="Georgia, serif" font-weight="700" font-size="10" fill="#e8e0d0" letter-spacing="2">ZEN</text>
      </svg>
      <div class="brand-text">
        <div class="brand-name">ZEN</div>
        <div class="brand-by">by <span>STAVYA</span></div>
      </div>
    </div>
    <button class="new-chat-btn" onclick="newChat()">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      NEW CHAT
    </button>
  </div>

  <div class="sidebar-section-label">Recent Chats</div>
  <div id="chat-history">
    <div class="history-empty" id="history-empty">No chats yet.<br>Start a conversation!</div>
  </div>

  <div class="sidebar-footer">
    ZEN AI · v1.0 &nbsp;·&nbsp; Built by Stavya ✦
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <header>
    <div class="current-chat-title" id="current-title">NEW CONVERSATION</div>
    <div class="header-right">

      <!-- Light / Dark toggle -->
      <div class="theme-toggle" title="Switch theme">
        <button class="theme-btn active" id="btn-light" onclick="setTheme('light')" title="Light">☀️</button>
        <button class="theme-btn"        id="btn-dark"  onclick="setTheme('dark')"  title="Dark">🌙</button>
      </div>

      <div class="status">
        <div class="status-dot"></div>
        ONLINE
      </div>
    </div>
  </header>

  <div id="chat-container"></div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="user-input" placeholder="Ask ZEN anything..." rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button id="send-btn" onclick="sendMessage()" title="Send">
        <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/></svg>
      </button>
    </div>
    <div class="hint">ENTER to send &nbsp;·&nbsp; SHIFT+ENTER for new line</div>
    <div id="error-area"></div>
  </div>
</div>

<script>
  // ── Theme ──
  function setTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    document.getElementById('btn-light').classList.toggle('active', t === 'light');
    document.getElementById('btn-dark').classList.toggle('active',  t === 'dark');
  }

  // ── State ──
  let sessions = [], currentId = null, isLoading = false;

  function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
  function getSession() { return sessions.find(s => s.id === currentId); }

  function newChat() {
    const id = genId();
    sessions.unshift({ id, title: 'New Chat', messages: [] });
    currentId = id;
    renderHistory();
    showWelcome();
    document.getElementById('current-title').textContent = 'NEW CONVERSATION';
    document.getElementById('user-input').focus();
  }

  function renderHistory() {
    const container = document.getElementById('chat-history');
    const empty     = document.getElementById('history-empty');
    const real      = sessions.filter(s => s.messages.length > 0);
    container.querySelectorAll('.history-item').forEach(el => el.remove());
    if (real.length === 0) { if (empty) empty.style.display = 'block'; return; }
    if (empty) empty.style.display = 'none';
    real.forEach(s => {
      const div = document.createElement('div');
      div.className = 'history-item' + (s.id === currentId ? ' active' : '');
      div.innerHTML = `<span class="history-item-text">${esc(s.title)}</span><button class="history-delete" title="Delete">✕</button>`;
      div.querySelector('.history-delete').addEventListener('click', e => { e.stopPropagation(); deleteSession(s.id); });
      div.addEventListener('click', () => loadSession(s.id));
      container.appendChild(div);
    });
  }

  function deleteSession(id) {
    sessions = sessions.filter(s => s.id !== id);
    if (currentId === id) {
      const r = sessions.filter(s => s.messages.length > 0);
      if (r.length) { currentId = r[0].id; loadSession(currentId); } else { newChat(); return; }
    }
    renderHistory();
  }

  function loadSession(id) {
    currentId = id;
    renderHistory();
    const s = getSession();
    const cc = document.getElementById('chat-container');
    cc.innerHTML = '';
    if (!s || !s.messages.length) { showWelcome(); return; }
    document.getElementById('current-title').textContent = s.title.toUpperCase();
    s.messages.forEach(m => appendBubble(m.role, m.content, false));
    cc.scrollTop = cc.scrollHeight;
  }

  function showWelcome() {
    document.getElementById('chat-container').innerHTML = `
      <div class="welcome" id="welcome">
        <h1>Hello,<br><span>what's on your mind?</span></h1>
        <p>ZEN by Stavya — ask me anything about coding, AI, science, space, or big ideas.</p>
        <div class="suggestions">
          <button class="suggestion-btn" onclick="sendSuggestion(this)">How does AI actually work?</button>
          <button class="suggestion-btn" onclick="sendSuggestion(this)">Teach me Python basics</button>
          <button class="suggestion-btn" onclick="sendSuggestion(this)">What is quantum computing?</button>
          <button class="suggestion-btn" onclick="sendSuggestion(this)">How do I start a tech company?</button>
          <button class="suggestion-btn" onclick="sendSuggestion(this)">Explain machine learning simply</button>
          <button class="suggestion-btn" onclick="sendSuggestion(this)">Write me a Python function</button>
        </div>
      </div>`;
  }

  function appendBubble(role, content, animate = true) {
    const w = document.getElementById('welcome');
    if (w) w.remove();
    const cc  = document.getElementById('chat-container');
    const div = document.createElement('div');
    div.className = `message ${role}`;
    if (!animate) div.style.animation = 'none';
    div.innerHTML = `
      <div class="avatar ${role === 'ai' ? 'ai' : 'user'}">${role === 'ai' ? 'AI' : 'YOU'}</div>
      <div class="bubble">${role === 'ai' ? fmt(content) : `<p>${esc(content)}</p>`}</div>`;
    cc.appendChild(div);
    cc.scrollTop = cc.scrollHeight;
    return div;
  }

  function esc(t) { return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function fmt(text) {
    return text
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/```[\w]*\n?([\s\S]*?)```/g,'<pre>$1</pre>')
      .replace(/`([^`]+)`/g,'<code>$1</code>')
      .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
      .split('\n\n').map(p=>`<p>${p.replace(/\n/g,'<br>')}</p>`).join('');
  }

  function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 140) + 'px'; }
  function handleKey(e)   { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
  function sendSuggestion(btn) { document.getElementById('user-input').value = btn.textContent; sendMessage(); }

  async function sendMessage() {
    if (isLoading) return;
    const input = document.getElementById('user-input');
    const text  = input.value.trim();
    if (!text) return;

    if (!currentId || !getSession()) newChat();

    input.value = '';
    input.style.height = 'auto';
    document.getElementById('error-area').innerHTML = '';
    document.getElementById('send-btn').disabled = true;
    isLoading = true;

    const s = getSession();
    s.messages.push({ role: 'user', content: text });

    if (s.messages.length === 1) {
      s.title = text.slice(0, 34) + (text.length > 34 ? '…' : '');
      document.getElementById('current-title').textContent = s.title.toUpperCase();
    }

    appendBubble('user', text);
    renderHistory();

    // Typing indicator
    const cc  = document.getElementById('chat-container');
    const tdv = document.createElement('div');
    tdv.className = 'message ai'; tdv.id = 'typing';
    tdv.innerHTML = `<div class="avatar ai">AI</div><div class="bubble"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>`;
    cc.appendChild(tdv); cc.scrollTop = 99999;

    try {
      const res  = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: `You are ZEN, a smart and friendly AI assistant created by Stavya — a young, ambitious developer going into 9th grade who wants to build companies in AI, quantum computing, space tech, and coding tools. You are concise, clear, encouraging, and love helping with coding, science, and big ideas. When showing code, use proper code blocks. Keep responses focused unless detail is needed.`,
          messages: s.messages.map(m => ({ role: m.role === 'ai' ? 'assistant' : 'user', content: m.content }))
        })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      const reply = data.content.map(b => b.text || '').join('');
      s.messages.push({ role: 'ai', content: reply });
      tdv.remove();
      appendBubble('ai', reply);
      renderHistory();
    } catch (err) {
      tdv.remove();
      s.messages.pop();
      document.getElementById('error-area').innerHTML = `<div class="error-msg">⚠ ${err.message || 'Something went wrong. Try again.'}</div>`;
    } finally {
      isLoading = false;
      document.getElementById('send-btn').disabled = false;
      input.focus();
    }
  }

  newChat();
</script>
</body>
</html>
